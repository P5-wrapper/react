name: Dependabot

on:
  pull_request:
    branches: [master]

concurrency:
  group: dependabot-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  dependabot-auto-format:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Check formatting
        id: format-check
        run: pnpm format:check
        continue-on-error: true

      - name: Fix formatting
        if: steps.format-check.outcome == 'failure'
        run: pnpm format

      - name: Check linting
        id: lint-check
        run: pnpm lint
        continue-on-error: true

      - name: Fix linting
        if: steps.lint-check.outcome == 'failure'
        run: pnpm lint:fix

      - name: Commit fixes
        if:
          steps.format-check.outcome == 'failure' || steps.lint-check.outcome ==
          'failure'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "🧹 style: apply formatting to dependabot PR"
          branch: ${{ github.head_ref }}

      - name: Enable auto-merge for Dependabot PRs
        run:
          gh pr merge --auto --merge "${{ github.event.pull_request.html_url }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

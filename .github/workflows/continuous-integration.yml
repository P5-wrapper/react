name: CI

on:
  pull_request:
    branches: [master]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Check formatting
        run: pnpm format:check

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Lint
        run: pnpm lint

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Run tests
        run: pnpm test:coverage

      - name: Find previous successful run
        id: previous-run
        run: |
          RUN_ID=$(gh api "repos/${{ github.repository }}/actions/workflows/CI.yml/runs?status=success&per_page=1" \
            --jq '.workflow_runs[0].id // empty')
          echo "run-id=$RUN_ID" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Download previous coverage artifact
        if: steps.previous-run.outputs.run-id != ''
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: test-coverage
          path: previous-coverage/
          run-id: ${{ steps.previous-run.outputs.run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment the new code coverage
        uses: lucassabreu/comment-coverage-clover@v0.16.0
        continue-on-error: true
        with:
          file: ./coverage/clover.xml
          base-file: ./previous-coverage/clover.xml
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload test coverage
        uses: actions/upload-artifact@v7
        with:
          name: test-coverage
          path: coverage/
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Build
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7

  npm-dry-run:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          registry-url: "https://registry.npmjs.org"

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          path: dist/

      - name: NPM publish dry run
        uses: JS-DevTools/npm-publish@v4
        with:
          access: "public"
          tag: "next"
          dry-run: true
          token: ${{ secrets.NPM_TOKEN }}
